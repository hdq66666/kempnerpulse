name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a previous in-progress run on the same ref when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      # uv installs the requested Python, syncs the project (brings in rich) plus
      # the dev group (pytest), then runs the unit + integration suite.
      - name: Run the test suite
        run: uv run --python ${{ matrix.python-version }} --group dev pytest tests/ -q
